<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Paste a Content-Security-Policy header and see every directive categorised, explained, and risk-checked. Runs fully locally."
    />
    <title>CSP Analyser — understand your Content-Security-Policy</title>
    <script>
      // Apply stored theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = !t || t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
